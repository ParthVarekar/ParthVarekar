  <rect class="bg" width="100%" height="100%" rx="8" ry="8"/>
  <text x="32" y="58" class="t" xml:space="preserve"></text>\n  <text x="32" y="90" class="t" xml:space="preserve">  hi, i&#x27;m parth — a builder who turns</text>\n  <text x="32" y="122" class="t" xml:space="preserve">  curiosity into repositories. i craft</text>\n  <text x="32" y="154" class="t" xml:space="preserve">  second-brains, study tools, and ai</text>\n  <text x="32" y="186" class="t" xml:space="preserve">  experiments. if it didn&#x27;t exist yesterday,</text>\n  <text x="32" y="218" class="t" xml:space="preserve">  i&#x27;m probably shipping it today.</text>\n  <text x="32" y="250" class="t" xml:space="preserve"></text>\n  <text x="32" y="282" class="t" xml:space="preserve"></text>\n  <text x="32" y="314" class="t" xml:space="preserve">  ─── skills ───</text>\n  <text x="32" y="346" class="t" xml:space="preserve"></text>\n  <text x="32" y="378" class="t" xml:space="preserve">  Python        ███████████████░░░  85%</text>\n  <text x="32" y="410" class="t" xml:space="preserve">  TypeScript    █████████████░░░░░  70%</text>\n  <text x="32" y="442" class="t" xml:space="preserve">  JavaScript    ███████████░░░░░░░  60%</text>\n  <text x="32" y="474" class="t" xml:space="preserve">  Next.js       ███████████░░░░░░░  62%</text>\n  <text x="32" y="506" class="t" xml:space="preserve">  AI / ML       ████████░░░░░░░░░░  45%</text>\n  <text x="32" y="538" class="t" xml:space="preserve">  Git / Bash    ██████████████░░░░  75%</text>\n  <text x="32" y="570" class="t" xml:space="preserve"></text>\n  <text x="32" y="602" class="t" xml:space="preserve"></text>\n  <text x="32" y="634" class="t" xml:space="preserve">  focus: ai · pkm · devtools · trading toys</text>\n  <text x="32" y="666" class="t" xml:space="preserve">  site:  parthvarekar.in</text>\n  <text x="32" y="698" class="t" xml:space="preserve"></text>
</svg>