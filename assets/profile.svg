  <rect class="bg" width="100%" height="100%" rx="8" ry="8"/>
  <text x="24" y="44" class="t" xml:space="preserve"></text>\n  <text x="24" y="70" class="t" xml:space="preserve">  hi, i&#x27;m parth — a builder who turns curiosity</text>\n  <text x="24" y="96" class="t" xml:space="preserve">  into repositories. i craft second-brains, study</text>\n  <text x="24" y="122" class="t" xml:space="preserve">  tools, and ai experiments. if it didn&#x27;t exist</text>\n  <text x="24" y="148" class="t" xml:space="preserve">  yesterday, i&#x27;m probably shipping it today.</text>\n  <text x="24" y="174" class="t" xml:space="preserve"></text>\n  <text x="24" y="200" class="t" xml:space="preserve">  ──────────────────────────────────────────────────</text>\n  <text x="24" y="226" class="t" xml:space="preserve"></text>\n  <text x="24" y="252" class="t" xml:space="preserve">  Python        ███████████████░░░  85%</text>\n  <text x="24" y="278" class="t" xml:space="preserve">  TypeScript    █████████████░░░░░  70%</text>\n  <text x="24" y="304" class="t" xml:space="preserve">  JavaScript    ███████████░░░░░░░  60%</text>\n  <text x="24" y="330" class="t" xml:space="preserve">  Next.js       ███████████░░░░░░░  62%</text>\n  <text x="24" y="356" class="t" xml:space="preserve">  AI / ML       ████████░░░░░░░░░░  45%</text>\n  <text x="24" y="382" class="t" xml:space="preserve">  Git / Bash    ██████████████░░░░  75%</text>\n  <text x="24" y="408" class="t" xml:space="preserve"></text>\n  <text x="24" y="434" class="t" xml:space="preserve">  focus: ai · pkm · devtools · trading toys</text>\n  <text x="24" y="460" class="t" xml:space="preserve">  site:  parthvarekar.in</text>\n  <text x="24" y="486" class="t" xml:space="preserve"></text>
</svg>