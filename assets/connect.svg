<svg xmlns="http://www.w3.org/2000/svg" width="662" height="280" viewBox="0 0 662 280">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg { fill: #0d1117; }
      .term {
        fill: #5eff9c;
        font-family: "JetBrains Mono", "Cascadia Code", "Fira Code", "Cascadia Mono", "Menlo", "Consolas", monospace;
        font-size: 14px;
        line-height: 20px;
        filter: url(#glow);
      }
    </style>
  </defs>
  <rect class="bg" width="100%" height="100%" rx="8" ry="8"/>
  <text x="20" y="36" class="term" xml:space="preserve">┌ connect.sh --open ──────────────────────────────────────────────────────┐</text>
